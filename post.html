      },
      {
        id: 5,
        title: "O que aprendi ao escrever todos os dias por um ano",

        category: "diario",
        tag: "Diário",

        fullContent: `

    // Função para pegar o parâmetro da URL
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    // Função para carregar o post
    function loadPost() {
      const postId = parseInt(getQueryParam('id'));
      const post = blogPosts.find(p => p.id === postId);

      if (!post) {
        document.getElementById('post-individual').innerHTML = `
          <div class="container" style="max-width: 800px; text-align: center; padding: 4rem 0;">
            <h2>Ops! Post não encontrado</h2>
            <a href="index.html#blog" class="btn btn-primary" style="margin-top: 2rem;">Voltar ao diário</a>
          </div>
        `;
        return;
      }

      // Preencher o conteúdo do post
      document.getElementById('post-tag').textContent = post.tag;
      document.getElementById('post-title').textContent = post.title;
      document.getElementById('post-date').textContent = post.dateDisplay;
      document.getElementById('post-image').src = post.image;
      document.getElementById('post-image').alt = post.title;
      document.getElementById('post-content').innerHTML = post.fullContent;
      document.title = `Beatriz Medeiros | ${post.title}`;

      // Animações (mesmo estilo do index.html)
      const animatedEls = document.querySelectorAll('[data-animate]');
      const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const delay = entry.target.dataset.delay || 0;
            setTimeout(() => entry.target.classList.add('in-view'), delay);
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

      animatedEls.forEach((el, index) => {
        const parent = el.parentElement;
        if (parent && parent.children.length > 1) {
          const siblingIndex = Array.from(parent.children).indexOf(el);
          el.dataset.delay = Math.min(siblingIndex * 80, 320);
        }
        revealObserver.observe(el);
      });
    }

    // Mesmas funções básicas do index.html
    document.addEventListener('DOMContentLoaded', () => {
      loadPost();

      // Preloader
      const preloader = document.getElementById('preloader');
      window.addEventListener('load', () => {
        setTimeout(() => preloader.classList.add('is-hidden'), 300);
      });
      setTimeout(() => preloader && preloader.classList.add('is-hidden'), 1500);

      // Menu mobile
      const navToggle = document.getElementById('nav-toggle');
      const mainNav = document.getElementById('main-nav');
      navToggle.addEventListener('click', () => {
        const isOpen = mainNav.classList.toggle('is-open');
        navToggle.classList.toggle('is-active', isOpen);
        navToggle.setAttribute('aria-expanded', isOpen);
        document.body.style.overflow = isOpen ? 'hidden' : '';
      });
      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => {
          if (mainNav.classList.contains('is-open')) {
            mainNav.classList.remove('is-open');
            navToggle.classList.remove('is-active');
            navToggle.setAttribute('aria-expanded', 'false');
            document.body.style.overflow = '';
          }
        });
      });

      // Ano no rodapé
      document.getElementById('year').textContent = new Date().getFullYear();
    });
  </script>
